<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Average score and total score</title>
    <link rel="stylesheet" href="css/notification.css">
</head>
<body>
<form>
    <div>
        <label for="physics">Physics: </label>
        <input id="physics" type="number" min="0" max="100" required>
    </div>
    <div>
        <label for="chemistry">Chemistry: </label>
        <input id="chemistry" type="number" min="0" max="100" required>
    </div>
    <div>
        <label for="biology">Biology: </label>
        <input id="biology" type="number" min="0" max="100" required>
    </div>
    <div class="notification">
        <p>Average score: </p>
        <p id="average"></p>
    </div>
    <div>
        <button type="button" onclick="averageTotal()">Submit</button>
    </div>
    <div class="notification">
        <p>Total score: </p>
        <p id="total"></p>
    </div>
</form>
<script src="js/average-total-score.js"></script>
</body>
</html>
