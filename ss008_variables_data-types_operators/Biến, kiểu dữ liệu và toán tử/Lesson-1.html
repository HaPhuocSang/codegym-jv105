<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Average score and total score</title>
</head>
<body>
<form>
    <div>
        <label for="physics">Physics: </label>
        <input id="physics" type="number" min="0" max="100" required>
    </div>
    <div>
        <label for="chemistry">Chemistry: </label>
        <input id="chemistry" type="number" min="0" max="100" required>
    </div>
    <div>
        <label for="biology">Biology: </label>
        <input id="biology" type="number" min="0" max="100" required>
    </div>
    <div style="display: flex; justify-content: flex-start">
        <p>Average score: </p>
        <p id="average"></p>
    </div>
    <div>
        <button type="button" onclick="average_total()">Submit</button>
    </div>
    <div style="display: flex; justify-content: flex-start; padding-top: 10px">
        Total score: <p id="total"></p>
    </div>
</form>
<script src="js/ls1.js"></script>
</body>
</html>
