<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Conversion</title>
    <link rel="stylesheet" href="currency-conversion.css">
</head>
<body>
<div class="container">
    <form>
        <div class="big-chill">
            <div class="wrapper">
                <label for="amount">Amount</label>
                <input id="amount" type="number" min="0" required>
            </div>
            <div class="wrapper">
                <label for="from_currency">From Currency</label>
                <select id="from_currency">
                    <option value="USD">USD</option>
                    <option value="VND">VND</option>
                </select>
            </div>
            <div class="wrapper">
                <label for="to_currency">To Currency</label>
                <select id="to_currency">
                    <option value="USD">USD</option>
                    <option value="VND">VND</option>
                </select>
            </div>
            <div class="wrapper">
                <label class="hid">Convert</label>
                <button type="button" onclick="currencyConversion()">Convert</button>
            </div>
        </div>
    </form>
    <p id="result" class="notification"></p>
</div>
<script src="currency-conversion.js"></script>
</body>
</html>
