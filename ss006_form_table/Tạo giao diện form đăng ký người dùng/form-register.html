<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<h1>Mô tả</h1>
<form method="post" action="/action_page.php">
    <div>
        <label for="username">Họ và tên:</label>
        <div><input name="username" id="username" type="text" required></div>
    </div>
    <div>
        <label for="email">Email:</label>
        <div><input name="email" id="email" type="email" required></div>
    </div>
    <div>
        <label for="phone">Số điện thoại</label>
        <input name="phone" id="phone" type="number" required>
    </div>
    <label>Giới tính:</label>
    <div>
        <label for="male"><input name="gender" id="male" type="radio" value="M" checked>Nam</label>
        <label for="woman"> <input name="gender" id="woman" type="radio" value="W">Nữ</label>
    </div>
    <input type="submit" value="đăng ký">
</form>
</body>
</html>
