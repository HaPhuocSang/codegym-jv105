<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Hobby</title>
        <link rel="stylesheet" href="1.css">
    </head>
    <body>
        <div class="hobby">
            <form action="/action_page.php">
                <table>
                    <tr>
                        <th colspan="2">Sở thích của bạn</th>
                    </tr>
                    <tr>
                        <td class="mot">Họ và tên</td>
                        <td class="hai"><label for="username"><input name="username" id="username" type="text" required></label></td>
                    </tr>
                    <tr>
                        <td class="mot">Email</td>
                        <td class="hai"><label for="email"><input name="email" id="email" type="email" required></label></td>
                    </tr>
                    <tr>
                        <td class="mot"><div>Sở thích</div></td>
                        <td class="hai">
                            <div class="select">
                                <label for="hobby1"><input type="checkbox" name="sports" id="hobby1" value="sports">Thể thảo</label>
                                <label for="hobby2"><input type="checkbox" name="musics" id="hobby2" value="musics">Âm nhạc</label>
                                <label for="hobby3"><input type="checkbox" name="read-a-book" id="hobby3" value="read-a-book">Đọc sách</label>
                                <label for="hobby4"><input type="checkbox" name="browsing-the-web" id="hobby4" value="browsing-the-web">Lướt web</label>
                                <label for="hobby5"><input type="checkbox" name="playing-games" id="hobby5" value="playing-games">Chơi game</label>
                                <label for="hobby6"><input type="checkbox" name="cinema" id="hobby6" value="cinema">Điện ảnh</label>
                                <label for="hobby7"><input type="checkbox" name="tourism" id="hobby7" value="tourism">Du lịch</label>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="mot"></td>
                        <td class="hai">
                            <button type="submit">Gửi thông tin</button>
                            <button type="reset">Nhập lại</button>
                        </td>                        
                    </tr>
                </table>             
            </form>
        </div>
    </body>
</html>
