<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perimeter and Area of a rectangle</title>
</head>
<body>
<form>
    <div>
        <label for="length">Enter the length:</label>
        <input id="length" type="number">
    </div>
    <div>
        <label for="width">Enter the width:</label>
        <input id="width" type="number">
    </div>
    <div>
        <button type="button" id="btnArea">Area</button>
        <div>Area: <p id="area"></p></div>
        <button type="button" id="btnPerimeter">Perimeter</button>
        <div>Perimeter: <p id="perimeter"></p></div>
    </div>
</form>
<script src="perimeter-area.js"></script>
</body>
</html>
