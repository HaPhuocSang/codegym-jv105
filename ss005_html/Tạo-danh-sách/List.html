<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List</title>
</head>
<body>
    <ul style="list-style-type:circle"><b>Việt nam</b>
        <ol type="1">
            <li>Hà Nội</li>
            <li>Sài Gòn</li>
            <li>Huế</li>
            <li>Đà Nẵng</li>
        </ol>
    </ul>
    <ul style="list-style-type:circle"><b>Hoa kỳ</b>
        <ol type="1">
            <li>New York</li>
            <li>Los Angeles</li>
            <li>Chicago</li>
            <li>Houston</li>
        </ol>
    </ul>
    <ul style="list-style-type:circle"><b>Trung Quốc</b>
        <ol type="1">
            <li>Beijing</li>
            <li>Chongqing</li>
            <li>Shanghai</li>
            <li>Tianjin</li>
        </ol>
    </ul>
</body>
</html>
