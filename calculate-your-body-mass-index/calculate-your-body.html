<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculate your body mass index.</title>
    <link rel="stylesheet" href="calculatebody.css">
</head>
<body>
<form>
    <div class="container">
        <div>
            <label for="height">Height(m):</label>
            <input type="number" id="height" name="height" min="1">
        </div>
        <div>
            <label for="weight">Weight(kg):</label>
            <input type="number" id="weight" name="weight" min="1">
        </div>
        <div>
            <button type="button" id="btnCalculateBody">Submit</button>
        </div>
        <div>
            <p id="result"></p>
        </div>
    </div>
</form>
<script src="calculate-body.js"></script>
</body>
</html>
